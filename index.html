<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jQuery 留言板</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero-card" aria-labelledby="page-title">
      <p class="eyebrow">PHP + MySQL + jQuery 小專案</p>
      <h1 id="page-title">留言板</h1>
      <p class="intro">輸入暱稱與留言，不刷新頁面就能新增並看到最新留言。</p>
    </section>

    <section class="form-card" aria-labelledby="form-title">
      <h2 id="form-title">新增留言</h2>
      <form id="message-form" novalidate>
        <div class="field-group">
          <label for="name">暱稱</label>
          <input id="name" name="name" type="text" maxlength="30" autocomplete="nickname" placeholder="例如：Joe" required>
        </div>

        <div class="field-group">
          <label for="content">留言內容</label>
          <textarea id="content" name="content" maxlength="500" rows="5" placeholder="寫下想說的話..." required></textarea>
          <p class="hint">最多 500 字。</p>
        </div>

        <div id="feedback" class="feedback" role="status" aria-live="polite"></div>

        <button id="submit-button" class="primary-button" type="submit">送出留言</button>
      </form>
    </section>

    <section class="list-card" aria-labelledby="list-title">
      <div class="list-header">
        <h2 id="list-title">最新留言</h2>
        <button id="refresh-button" class="ghost-button" type="button">重新載入</button>
      </div>
      <div id="message-list" class="message-list" aria-live="polite">
        <p class="empty-state">留言載入中...</p>
      </div>
    </section>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
          crossorigin="anonymous"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
